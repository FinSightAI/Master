name: Keep Render Warm

# Pings the Render backend every 10 minutes so Render Free Tier
# (which sleeps after 15 min of inactivity) stays awake. Eliminates
# the ~25s cold-start that users would otherwise see on first request.

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (Render free tier sleeps after 15 min idle)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /health
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 60 https://master-backend-79jx.onrender.com/health; then
              echo " — OK"
              exit 0
            fi
            echo "attempt $i failed, retrying…"
            sleep 15
          done
          echo "all attempts failed"
          exit 1
