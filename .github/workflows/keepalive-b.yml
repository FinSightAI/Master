name: Keep Render Warm (B — offset)

on:
  schedule:
    - cron: '7,21,35,49 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /health
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 60 https://master-backend-79jx.onrender.com/health; then
              echo " — OK"; exit 0
            fi
            sleep 15
          done
          exit 0
