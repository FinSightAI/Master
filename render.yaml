services:
  - type: web
    name: tax-master-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health
